<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker - Official</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#F6F8FA] font-sans">
    <section
      id="login-container"
      class="flex flex-col items-center justify-center min-h-screen p-4"
    >
      <div class="mb-4">
        <svg
          height="60"
          viewBox="0 0 16 16"
          width="60"
          class="fill-current text-black"
        >
          <path
            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
          ></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-[#1F2328]">GitHub Issues Tracker</h1>
      <p class="text-gray-500 mb-8">Sign in to manage your issues</p>

      <div
        class="w-full max-w-[400px] bg-white border border-gray-200 rounded-lg p-8 shadow-sm"
      >
        <div class="mb-4">
          <label class="block text-sm font-bold mb-2 text-[#1F2328]"
            >Username</label
          >
          <input
            type="text"
            id="user-name"
            placeholder="Enter Username"
            class="input input-bordered w-full bg-white border-gray-300"
          />
          <p class="text-[10px] text-blue-600 mt-1 italic">Default: admin</p>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-bold mb-2 text-[#1F2328]"
            >Password</label
          >
          <input
            type="password"
            id="user-pass"
            placeholder="Enter Password"
            class="input input-bordered w-full bg-white border-gray-300"
          />
          <p class="text-[10px] text-blue-600 mt-1 italic">Default: admin123</p>
        </div>
        <button
          onclick="handleLogin()"
          class="btn w-full bg-[#4433ff] hover:bg-[#3322ee] text-white border-none font-bold"
        >
          Sign In
        </button>

        <div class="flex items-center my-6">
          <div class="flex-grow border-t border-gray-300"></div>
          <span class="px-3 text-xs font-bold text-gray-500">OR</span>
          <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <div class="text-center text-sm">
          <p class="text-gray-500 mb-2">Demo Credentials:</p>
          <p class="font-bold">
            Username: <span class="font-normal text-gray-600">admin</span>
          </p>
          <p class="font-bold">
            Password: <span class="font-normal text-gray-600">admin123</span>
          </p>
        </div>
      </div>
    </section>

    <dialog id="success_modal" class="modal">
      <div
        class="modal-box text-center bg-white flex flex-col items-center p-10"
      >
        <div
          class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-4 border-2 border-green-200"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-10 w-10"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="3"
              d="M5 13l4 4L19 7"
            />
          </svg>
        </div>
        <h3 class="font-bold text-3xl text-gray-800">Success!</h3>
        <p class="py-2 text-gray-500">Login Successful</p>
        <div class="modal-action w-full flex justify-center mt-6">
          <button
            onclick="goToDashboard()"
            class="btn bg-[#4433ff] hover:bg-[#3322ee] text-white px-10 border-none"
          >
            Continue
          </button>
        </div>
      </div>
    </dialog>

    <main id="dashboard-content" class="hidden">
      <nav
        class="bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-50"
      >
        <div class="flex items-center gap-2 font-bold text-xl">
          <svg height="32" viewBox="0 0 16 16" width="32">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
          <span>Issues Tracker</span>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            id="search-input"
            placeholder="Search all issues"
            class="input input-sm border-gray-300 w-64 bg-[#F6F8FA]"
          />
          <button
            onclick="handleSearch()"
            class="btn btn-sm bg-[#2DA44E] hover:bg-[#2C974B] text-white border-none"
          >
            Search
          </button>
        </div>
      </nav>

      <div class="max-w-[1280px] mx-auto p-8">
        <div class="flex gap-1 mb-4" id="tab-btns">
          <button
            onclick="filterByStatus('all', this)"
            class="btn btn-sm bg-gray-200 border-gray-300 font-bold"
          >
            All
          </button>
          <button
            onclick="filterByStatus('open', this)"
            class="btn btn-sm btn-ghost text-gray-500 border-none"
          >
            Open
          </button>
          <button
            onclick="filterByStatus('closed', this)"
            class="btn btn-sm btn-ghost text-gray-500 border-none"
          >
            Closed
          </button>
        </div>

        <div
          class="bg-[#F6F8FA] border border-gray-300 rounded-t-lg p-4 flex justify-between items-center text-sm font-bold"
        >
          <div id="total-text">0 Issues Found</div>
          <div class="flex gap-4">
            <span class="text-green-600"
              >🟢 Open: <span id="count-open">0</span></span
            >
            <span class="text-purple-600"
              >🟣 Closed: <span id="count-closed">0</span></span
            >
          </div>
        </div>

        <div
          id="card-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-white border-x border-b border-gray-300 p-6 rounded-b-lg min-h-[400px]"
        ></div>

        <div id="loading" class="hidden flex justify-center py-10 w-full">
          <span class="loading loading-spinner loading-lg text-blue-600"></span>
        </div>
      </div>
    </main>

    <dialog id="details_modal" class="modal">
      <div class="modal-box bg-white max-w-2xl border-t-8 border-blue-600">
        <div id="modal-content"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn bg-black text-white px-8">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
