<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repo Issue Tracker - Pro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#F6F8FA] font-sans text-[#1F2328]">
    <section
      id="login-section"
      class="flex flex-col items-center justify-center min-h-screen p-4"
    >
      <div class="mb-4">
        <svg
          height="60"
          viewBox="0 0 16 16"
          width="60"
          class="fill-current text-black"
        >
          <path
            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
          ></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 mb-6">Sign in to manage your issues</p>
      <div
        class="w-full max-w-sm bg-white border border-gray-200 rounded-lg p-8 shadow-sm"
      >
        <div class="form-control mb-4">
          <label class="label font-bold text-gray-700">Username</label>
          <input
            type="text"
            id="input-user"
            placeholder="Enter Username"
            class="input input-bordered w-full bg-white border-gray-300"
          />
        </div>
        <div class="form-control mb-6">
          <label class="label font-bold text-gray-700">Password</label>
          <input
            type="password"
            id="input-pass"
            placeholder="Enter Password"
            class="input input-bordered w-full bg-white border-gray-300"
          />
        </div>
        <button
          onclick="startLogin()"
          class="btn w-full bg-[#4433ff] hover:bg-[#3322ee] text-white border-none font-bold"
        >
          Sign In
        </button>
        <div class="text-center text-xs text-gray-500 mt-6">
          Demo: admin / admin123
        </div>
      </div>
    </section>

    <main id="main-dashboard" class="hidden">
      <nav
        class="bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-50"
      >
        <div class="flex items-center gap-2 font-bold text-xl">
          <svg height="32" viewBox="0 0 16 16" width="32">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
          <span>Issues</span>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            id="search-box"
            placeholder="Search issues..."
            class="input input-sm border-gray-300 w-48 md:w-64"
          />
          <button
            onclick="handleSearch()"
            class="btn btn-sm bg-[#2DA44E] hover:bg-[#2C974B] text-white border-none"
          >
            Search
          </button>
        </div>
      </nav>

      <div class="max-w-[1400px] mx-auto p-6">
        <div class="flex gap-2 mb-6" id="tab-group">
          <button
            onclick="changeTab('all', this)"
            class="btn btn-sm bg-[#4433ff] text-white font-bold border-none px-6"
          >
            All
          </button>
          <button
            onclick="changeTab('open', this)"
            class="btn btn-sm btn-ghost bg-white border border-gray-300 text-gray-700 hover:bg-gray-50"
          >
            Open
          </button>
          <button
            onclick="changeTab('closed', this)"
            class="btn btn-sm btn-ghost bg-white border border-gray-300 text-gray-700 hover:bg-gray-50"
          >
            Closed
          </button>
        </div>

        <div
          class="bg-[#F6F8FA] border border-gray-300 rounded-t-lg p-4 flex justify-between items-center text-sm"
        >
          <div class="flex items-center gap-3 font-semibold text-gray-900">
            <svg
              viewBox="0 0 16 16"
              width="16"
              height="16"
              class="fill-current text-gray-500"
            >
              <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path>
              <path
                d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"
              ></path>
            </svg>
            <span id="issue-total">0 Issues</span>
            <span class="font-normal text-gray-600 hidden md:inline"
              >Track and manage your project issues</span
            >
          </div>
          <div class="flex gap-5 font-medium text-xs">
            <span class="flex items-center gap-1.5">
              <span class="w-3 h-3 rounded-full bg-[#2DA44E]"></span>
              Open:
              <span id="open-count" class="font-bold text-gray-900">0</span>
            </span>
            <span class="flex items-center gap-1.5">
              <span class="w-3 h-3 rounded-full bg-[#8250DF]"></span>
              Closed:
              <span id="closed-stat" class="font-bold text-gray-900">0</span>
            </span>
          </div>
        </div>

        <div
          id="cards-list"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 bg-white border-x border-b border-gray-300 p-6 rounded-b-lg min-h-[400px]"
        ></div>

        <div id="spinner" class="hidden flex justify-center py-20 w-full">
          <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
      </div>
    </main>

    <dialog id="details_modal" class="modal">
      <div
        class="modal-box bg-white max-w-2xl border border-gray-200 shadow-xl"
      >
        <div id="modal-body-content"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-sm bg-gray-800 text-white border-none">
              Close
            </button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
