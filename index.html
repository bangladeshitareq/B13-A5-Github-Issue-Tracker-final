<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .github-card {
        transition: all 0.2s ease;
        border: 1px solid #d0d7de;
      }
      .github-card:hover {
        border-color: #0969da;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body class="bg-[#F6F8FA] text-[#1F2328]">
    <section
      id="login-section"
      class="flex items-center justify-center min-h-screen"
    >
      <div
        class="bg-white p-8 rounded-lg shadow-md border border-gray-200 w-full max-w-sm text-center"
      >
        <svg height="48" viewBox="0 0 16 16" width="48" class="mx-auto mb-4">
          <path
            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
          ></path>
        </svg>
        <h2 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h2>
        <p class="text-sm text-gray-500 mb-6">Sign in to manage your issues</p>
        <input
          type="text"
          id="input-user"
          placeholder="Username"
          class="input input-bordered w-full mb-3 bg-white"
        />
        <input
          type="password"
          id="input-pass"
          placeholder="Password"
          class="input input-bordered w-full mb-6 bg-white"
        />
        <button
          onclick="startLogin()"
          class="btn w-full bg-[#4433ff] hover:bg-[#3322ee] text-white border-none"
        >
          Sign In
        </button>
        <p class="mt-4 text-[11px] text-gray-400 font-medium">
          Demo: admin / admin123
        </p>
      </div>
    </section>

    <main id="main-dashboard" class="hidden">
      <nav
        class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center"
      >
        <div class="flex items-center gap-2 font-bold text-lg italic">
          <svg height="32" viewBox="0 0 16 16" width="32">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
          <span>GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            id="search-box"
            placeholder="Search all issues"
            class="input input-sm border-gray-300 w-64 bg-white"
          />
          <button
            onclick="handleSearch()"
            class="btn btn-sm bg-[#2DA44E] hover:bg-[#2C974B] text-white border-none px-5"
          >
            Search
          </button>
        </div>
      </nav>

      <div class="max-w-[1400px] mx-auto p-8">
        <div class="flex gap-2 mb-6" id="tab-group">
          <button
            onclick="changeTab('all', this)"
            class="btn btn-sm bg-[#4433ff] text-white px-6"
          >
            All
          </button>
          <button
            onclick="changeTab('open', this)"
            class="btn btn-sm bg-white border-gray-300 text-gray-700 hover:bg-gray-50 px-6"
          >
            Open
          </button>
          <button
            onclick="changeTab('closed', this)"
            class="btn btn-sm bg-white border-gray-300 text-gray-700 hover:bg-gray-50 px-6"
          >
            Closed
          </button>
        </div>

        <div
          class="bg-[#F6F8FA] border border-gray-300 rounded-t-xl p-4 flex justify-between items-center"
        >
          <div class="flex items-center gap-3 font-bold text-gray-900">
            <svg
              viewBox="0 0 16 16"
              width="18"
              height="18"
              class="fill-current text-gray-500"
            >
              <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"></path>
              <path
                d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"
              ></path>
            </svg>
            <span id="issue-total">50 Issues</span>
            <span
              class="font-normal text-xs text-gray-500 ml-2 hidden md:inline"
              >Track and manage your project issues</span
            >
          </div>
          <div class="flex gap-6 text-xs font-bold">
            <span class="flex items-center gap-2"
              ><span class="w-3 h-3 rounded-full bg-[#2DA44E]"></span> Open:
              <span id="open-count">0</span></span
            >
            <span class="flex items-center gap-2"
              ><span class="w-3 h-3 rounded-full bg-[#8250DF]"></span> Closed:
              <span id="closed-stat">0</span></span
            >
          </div>
        </div>

        <div
          id="cards-list"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 bg-white border-x border-b border-gray-300 p-8 rounded-b-xl min-h-[400px]"
        ></div>
      </div>
    </main>

    <dialog id="details_modal" class="modal">
      <div class="modal-box bg-white max-w-2xl border border-gray-200">
        <div id="modal-body-content"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-sm bg-gray-800 text-white">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
