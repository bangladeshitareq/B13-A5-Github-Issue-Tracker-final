<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#F6F8FA]">
    <section
      id="login-container"
      class="flex flex-col justify-center items-center min-h-screen"
    >
      <div class="mb-6">
        <svg
          height="48"
          viewBox="0 0 16 16"
          width="48"
          class="fill-current text-black"
        >
          <path
            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
          ></path>
        </svg>
      </div>

      <h1 class="text-2xl font-light mb-4 text-[#1F2328]">
        Sign in to GitHub Issues
      </h1>

      <div
        class="bg-white border border-[#D8DEE4] rounded-md p-5 w-full max-w-[308px] shadow-sm"
      >
        <div class="mb-4">
          <label class="block text-sm font-normal mb-2 text-[#1F2328]"
            >Username</label
          >
          <input
            type="text"
            id="user-name"
            placeholder="admin"
            class="input input-bordered w-full h-8 min-h-[32px] bg-[#F6F8FA] border-[#D0D7DE] focus:bg-white focus:border-[#0969DA] focus:outline-none text-sm"
          />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-normal mb-2 text-[#1F2328]"
            >Password</label
          >
          <input
            type="password"
            id="user-pass"
            placeholder="admin123"
            class="input input-bordered w-full h-8 min-h-[32px] bg-[#F6F8FA] border-[#D0D7DE] focus:bg-white focus:border-[#0969DA] focus:outline-none text-sm"
          />
        </div>
        <button
          onclick="handleLogin()"
          class="btn w-full bg-[#2DA44E] hover:bg-[#2C974B] text-white border-none min-h-[32px] h-8 normal-case font-semibold text-sm"
        >
          Sign in
        </button>
      </div>

      <div
        class="mt-4 border border-[#D8DEE4] rounded-md p-4 w-full max-w-[308px] text-center bg-white"
      >
        <p class="text-sm">
          Demo credentials? <span class="text-[#0969DA]">admin / admin123</span>
        </p>
      </div>
    </section>

    <main id="dashboard-content" class="hidden">
      <nav
        class="bg-white border-b border-[#D8DEE4] px-4 py-3 flex justify-between items-center"
      >
        <div class="flex items-center gap-2 font-semibold text-[#1F2328]">
          <svg height="32" viewBox="0 0 16 16" width="32" class="fill-current">
            <path
              d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"
            ></path>
          </svg>
          <span>Issues</span>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            id="search-input"
            placeholder="Search all issues"
            class="input input-bordered h-8 min-h-[32px] w-64 bg-[#F6F8FA] text-sm"
          />
          <button
            onclick="searchIssues()"
            class="btn btn-sm bg-[#2DA44E] hover:bg-[#2C974B] text-white border-none normal-case"
          >
            Search
          </button>
        </div>
      </nav>

      <div class="max-w-[1216px] mx-auto p-8">
        <div class="flex items-center gap-1 mb-4">
          <button
            onclick="filterIssues('all', this)"
            class="btn btn-sm btn-ghost normal-case active-tab border-[#D8DEE4]"
            id="all-btn"
          >
            All
          </button>
          <button
            onclick="filterIssues('open', this)"
            class="btn btn-sm btn-ghost normal-case text-gray-500"
            id="open-btn"
          >
            Open
          </button>
          <button
            onclick="filterIssues('closed', this)"
            class="btn btn-sm btn-ghost normal-case text-gray-500"
            id="closed-btn"
          >
            Closed
          </button>
        </div>

        <div
          class="bg-[#F6F8FA] border border-[#D8DEE4] rounded-t-md p-4 flex justify-between items-center"
        >
          <div
            class="flex items-center gap-4 text-sm font-semibold text-[#1F2328]"
          >
            <span id="total-stat">0 Issues</span>
          </div>
          <div class="flex gap-4 text-xs">
            <span class="text-green-600 font-bold"
              >Open: <span id="open-stat">0</span></span
            >
            <span class="text-purple-600 font-bold"
              >Closed: <span id="closed-stat">0</span></span
            >
          </div>
        </div>

        <div
          id="issue-container"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-white border-x border-b border-[#D8DEE4] rounded-b-md p-4 min-h-[200px]"
        ></div>

        <div id="loading-spinner" class="hidden flex justify-center py-10">
          <span class="loading loading-spinner loading-md"></span>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
